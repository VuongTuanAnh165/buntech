interface:
  display_name: "Agentic Review Handoff"
  short_description: "Run review-fix-re-review loops across agents."
  default_prompt: "Use $agentic-review-handoff for the current stage: review, fix, or re-review. Only use it inside a git repo. Always state stage and scope first, then locate or create the packet under $repo_root/.review-handoff/active/<branch_slug>/ via `git rev-parse --show-toplevel` before producing any review output (per SKILL.md Workflow Step 1+2). If reviewing, verify team/reviewer feedback with first principles, DDD, high-cohesion/low-coupling checks, and official sources when external APIs, frameworks, browsers, security, payments, or platforms are involved. If fixing, only fix validated findings and end with a Fix Completion section whose first subsection is Fix Conclusion; Original Findings Snapshot must be strictly verbatim (8 columns identical to Fix Handoff). If re-reviewing, do a scoped re-review of prior findings and nearby regressions only, then apply the lifecycle action per the verdict (PASS/NO_FINDINGS -> mv to archive/<branch_slug>/; PASS_WITH_CONCERNS -> awaiting_user_decision; BLOCKED -> blocked)."
